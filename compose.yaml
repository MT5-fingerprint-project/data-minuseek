services:
  data:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      # Garde le venv construit dans l'image (ne pas écraser avec l'hôte)
      - /app/.venv
      # Garde les jars SourceAFIS construits dans l'image (ne pas écraser avec l'hôte)
      - /app/build
    command: uv run uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      - S3_API_URL=http://app:3000/media
    networks:
      - default
      - minuseek

networks:
  minuseek:
    external: true
