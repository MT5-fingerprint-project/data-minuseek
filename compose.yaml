services:
  data:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      # Garde le venv construit dans l'image (ne pas écraser avec l'hôte)
      - /app/.venv
      # Garde les jars SourceAFIS construits dans l'image (ne pas écraser avec l'hôte)
      - /app/build
      # ADC keyless (impersonation back-runtime@dev-minuseek), cf. ADR-0003 du back
      - ${HOME}/.config/gcloud:/root/.config/gcloud:ro
    command: uv run uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      - GCS_BUCKET=minuseek-media-dev
      - GCP_PROJECT=dev-minuseek
    networks:
      - default
      - minuseek

networks:
  minuseek:
    external: true
