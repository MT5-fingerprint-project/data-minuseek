services:
  data:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      # Garde le venv construit dans l'image (ne pas écraser avec l'hôte)
      - /app/.venv
    command: uv run uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload
